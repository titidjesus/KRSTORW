<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja de Roupas</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:black;
color:white;
text-align:center;
padding:20px;
}

.produtos{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

.produto{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:black;
color:white;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#333;
}

.carrinho{
position:fixed;
right:20px;
top:20px;
background:white;
padding:20px;
border-radius:10px;
width:250px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
}

.whatsapp img{
width:60px;
}

.pagamento{
margin-top:10px;
}
</style>

</head>

<body>

<header>
<h1>Minha Loja</h1>
</header>

<div class="produtos">

<div class="produto">
<h3>Camiseta Básica</h3>
<p>R$ 49.90</p>
<button onclick="addCarrinho('Camiseta Básica',49.90)">Adicionar</button>
</div>

<div class="produto">
<h3>Moletom</h3>
<p>R$ 120.00</p>
<button onclick="addCarrinho('Moletom',120)">Adicionar</button>
</div>

<div class="produto">
<h3>Calça Jeans</h3>
<p>R$ 99.90</p>
<button onclick="addCarrinho('Calça Jeans',99.90)">Adicionar</button>
</div>

<div class="produto">
<h3>Camisa Social</h3>
<p>R$ 89.90</p>
<button onclick="addCarrinho('Camisa Social',89.90)">Adicionar</button>
</div>

<div class="produto">
<h3>Jaqueta</h3>
<p>R$ 150.00</p>
<button onclick="addCarrinho('Jaqueta',150)">Adicionar</button>
</div>

<div class="produto">
<h3>Bermuda</h3>
<p>R$ 59.90</p>
<button onclick="addCarrinho('Bermuda',59.90)">Adicionar</button>
</div>

</div>

<div class="carrinho">

<h3>Carrinho</h3>

<ul id="lista"></ul>

<p>Total: R$ <span id="total">0</span></p>

<div class="pagamento">

<select id="metodo">
<option value="">Escolher pagamento</option>
<option value="pix">PIX</option>
<option value="cartao">Cartão</option>
</select>

<button onclick="finalizar()">Finalizar</button>

</div>

<div id="pix"></div>

</div>

<a class="whatsapp" 
href="https://wa.me/5511999999999?text=Olá%20tenho%20interesse%20em%20uma%20roupa%20da%20loja"
target="_blank">

<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">

</a>

<script>

let carrinho = []
let total = 0

function addCarrinho(nome,preco){

carrinho.push({nome,preco})

total += preco

atualizar()

}

function remover(index){

total -= carrinho[index].preco

carrinho.splice(index,1)

atualizar()

}

function atualizar(){

let lista = document.getElementById("lista")

lista.innerHTML=""

carrinho.forEach((item,i)=>{

lista.innerHTML += `
<li>
${item.nome} - R$${item.preco}
<button onclick="remover(${i})">X</button>
</li>
`

})

document.getElementById("total").innerText = total.toFixed(2)

}

function finalizar(){

let metodo = document.getElementById("metodo").value

if(metodo=="pix"){

let chave="SEUPIX"

document.getElementById("pix").innerHTML =

`<p>PIX copia e cola:</p>
<textarea rows="3" cols="25">${chave}</textarea>`

}

if(metodo=="cartao"){

if(total >=150){

alert("Pagamento em até 3x disponível!")

}else{

alert("Pagamento no cartão à vista")

}

}

}

</script>

</body>
</html>
