<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KRSTORW | Loja Masculina</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:black;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}

.logo{
font-size:24px;
font-weight:bold;
}

.carrinho{
background:white;
color:black;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
}

.banner{
background:#111;
color:white;
text-align:center;
padding:60px 20px;
}

.banner h1{
font-size:40px;
margin:0;
}

.produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.produto{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.produto img{
width:100%;
border-radius:10px;
}

.preco{
color:green;
font-size:22px;
font-weight:bold;
}

button{
background:black;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#444;
}

footer{
background:black;
color:white;
text-align:center;
padding:30px;
}

#carrinhoBox{
display:none;
position:fixed;
right:20px;
top:80px;
background:white;
padding:20px;
width:260px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
border-radius:10px;
}

.whatsappBtn{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:24px;
text-decoration:none;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<header>

<div class="logo">KRSTORW</div>

<div class="carrinho" onclick="abrirCarrinho()">
🛒 Carrinho (<span id="contador">0</span>)
</div>

</header>

<section class="banner">

<h1>KRSTORW</h1>
<p>Moda Masculina Premium</p>

</section>

<section class="produtos">

<div class="produto">

<img src="https://via.placeholder.com/300">

<h3>Camiseta Streetwear</h3>

<p class="preco">R$79,90</p>

<button onclick="addCarrinho('Camiseta Streetwear')">
Adicionar ao carrinho
</button>

</div>

<div class="produto">

<img src="https://via.placeholder.com/300">

<h3>Moletom Oversized</h3>

<p class="preco">R$149,90</p>

<button onclick="addCarrinho('Moletom Oversized')">
Adicionar ao carrinho
</button>

</div>

<div class="produto">

<img src="https://via.placeholder.com/300">

<h3>Calça Cargo</h3>

<p class="preco">R$129,90</p>

<button onclick="addCarrinho('Calça Cargo')">
Adicionar ao carrinho
</button>

</div>

</section>

<div id="carrinhoBox">

<h3>Seu Carrinho</h3>

<ul id="listaCarrinho"></ul>

<p>Subtotal: R$ <span id="subtotal">0</span></p>

<hr>

<label>Frete:</label>

<select id="frete" onchange="calcularTotal()">

<option value="0">Retirada na loja - Grátis</option>

<option value="15">Entrega padrão - R$15</option>

<option value="30">Entrega expressa - R$30</option>

</select>

<p>Frete: R$ <span id="valorFrete">0</span></p>

<h3>Total: R$ <span id="total">0</span></h3>

<hr>

<label>Forma de pagamento:</label>

<select id="pagamento">

<option>Pix</option>

<option>Cartão</option>

</select>

<br><br>

<button onclick="finalizarCompra()">Finalizar compra</button>

<br><br>

<button onclick="fecharCarrinho()">Fechar</button>

</div>

<footer>

<p>Pagamentos aceitos</p>

<p>💳 Cartão | ⚡ Pix</p>

<p>© 2026 KRSTORW</p>

</footer>

<a class="whatsappBtn" href="https://wa.me/5511999999999?text=Olá%20tenho%20interesse%20nas%20roupas%20da%20KRSTORW" target="_blank">
💬
</a>

<script>

let contador = 0;
let lista = [];
let precoProduto = 0;

const precos = {

"Camiseta Streetwear":79.90,

"Moletom Oversized":149.90,

"Calça Cargo":129.90

};

function addCarrinho(produto){

contador++;

document.getElementById("contador").innerText = contador;

lista.push(produto);

precoProduto += precos[produto];

mostrarLista();

calcularTotal();

}

function mostrarLista(){

let html = "";

lista.forEach(item => {

html += "<li>"+item+"</li>";

});

document.getElementById("listaCarrinho").innerHTML = html;

document.getElementById("subtotal").innerText = precoProduto.toFixed(2);

}

function calcularTotal(){

let frete = document.getElementById("frete").value;

document.getElementById("valorFrete").innerText = frete;

let total = parseFloat(precoProduto) + parseFloat(frete);

document.getElementById("total").innerText = total.toFixed(2);

}

function abrirCarrinho(){

document.getElementById("carrinhoBox").style.display = "block";

}

function fecharCarrinho(){

document.getElementById("carrinhoBox").style.display = "none";

}

function finalizarCompra(){

let pagamento = document.getElementById("pagamento").value;

let total = document.getElementById("total").innerText;

let mensagem = "Pedido KRSTORW%0A";

lista.forEach(item=>{
mensagem += item+"%0A";
});

mensagem += "%0ATotal: R$ "+total;

mensagem += "%0APagamento: "+pagamento;

window.open("https://wa.me/5511922244160?text="+mensagem);

}

</script>

</body>
</html>
