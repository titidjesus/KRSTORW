<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRSTORW | Loja Masculina</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:black;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}

.logo{
font-size:24px;
font-weight:bold;
}

.carrinho{
background:white;
color:black;
padding:8px 15px;
border-radius:20px;
}

.banner{
background:#111;
color:white;
text-align:center;
padding:60px 20px;
}

.banner h1{
font-size:40px;
margin:0;
}

.produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.produto{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.produto img{
width:100%;
border-radius:10px;
}

.preco{
color:green;
font-size:22px;
font-weight:bold;
}

button{
background:black;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#444;
}

.whatsapp{
display:inline-block;
margin-top:10px;
background:#25D366;
padding:10px 15px;
color:white;
text-decoration:none;
border-radius:5px;
}

footer{
background:black;
color:white;
text-align:center;
padding:30px;
}

</style>
</head>

<body>

<div class="logo">KRSTORW</div>

🛒 Carrinho (<span id="contador">0</span>)

</section>

<section class="produtos">

<div class="produto">

<img src="https://via.placeholder.com/300">

<h3>Camiseta Streetwear</h3>

<p class="preco">R$79,90</p>

<button onclick="addCarrinho()">Adicionar ao carrinho</button>

<br>

<a class="whatsapp" href="https://wa.me/5511999999999">
Comprar no WhatsApp
</a>

</div>

<div class="produto">

<img src="https://via.placeholder.com/300">

Comprar no WhatsApp
</a>

Comprar no WhatsApp

<footer>

<p>Pagamentos aceitos:</p>

<p>💳 Cartão | ⚡ Pix | 💬 WhatsApp</p>

<p>© 2026 KRSTORW</p>

</footer>

<script>

let contador = 0;

function addCarrinho(){

contador++;

document.getElementById("contador").innerText = contador;

}

</script>

</html>
